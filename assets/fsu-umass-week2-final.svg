<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Florida State defeats UMass 45 to 16</title>
  <desc id="desc">An original Jumpman News Network Week 2 final score graphic.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071a33"/><stop offset=".56" stop-color="#351626"/><stop offset="1" stop-color="#782f40"/></linearGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse"><path d="M72 0H0V72" fill="none" stroke="#fff" stroke-opacity=".045"/></pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-opacity=".4"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M0 690L1600 320V900H0Z" fill="#071a33" fill-opacity=".7"/>
  <rect x="70" y="54" width="290" height="54" fill="#f0143c"/><text x="215" y="91" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="5">WEEK 2 FINAL</text>
  <text x="76" y="175" fill="#c9d2df" font-family="Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="7">TALLAHASSEE · GLENN CLOCKS IN AGAIN</text>
  <g filter="url(#shadow)">
    <text x="76" y="360" fill="white" font-family="Arial Black, Arial, sans-serif" font-size="122" font-weight="900">FLORIDA STATE</text>
    <text x="76" y="520" fill="white" font-family="Arial Black, Arial, sans-serif" font-size="190" font-weight="900">45</text>
    <text x="420" y="505" fill="#f0143c" font-family="Arial Black, Arial, sans-serif" font-size="92" font-weight="900">—</text>
    <text x="520" y="520" fill="#c9d2df" font-family="Arial Black, Arial, sans-serif" font-size="190" font-weight="900">16</text>
    <text x="520" y="600" fill="#c9d2df" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900">UMASS</text>
  </g>
  <line x1="76" y1="652" x2="1515" y2="652" stroke="#f0143c" stroke-width="8"/>
  <g font-family="Arial, sans-serif"><text x="76" y="716" fill="#c9d2df" font-size="24" font-weight="700" letter-spacing="3">TOTAL OFFENSE</text><text x="76" y="777" fill="white" font-size="54" font-weight="900">FSU 369 · UMASS 166</text>
  <text x="650" y="716" fill="#c9d2df" font-size="24" font-weight="700" letter-spacing="3">Q. WISNER</text><text x="650" y="777" fill="white" font-size="54" font-weight="900">131 RUSH YDS · 2 TD</text>
  <text x="1255" y="716" fill="#c9d2df" font-size="24" font-weight="700" letter-spacing="3">A. DANIELS</text><text x="1255" y="777" fill="white" font-size="43" font-weight="900">198 PASS · 2 TD*</text></g>
  <text x="1518" y="855" text-anchor="end" fill="white" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900">JNN</text>
  <text x="76" y="850" fill="#c9d2df" font-family="Arial, sans-serif" font-size="20">*1 passing touchdown, 1 rushing touchdown</text>
</svg>
