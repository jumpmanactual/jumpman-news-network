<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Universidad México 10, Duke 7</title><desc id="desc">Original JNN final score graphic celebrating the first win in Universidad México history.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#050505"/><stop offset=".55" stop-color="#12213a"/><stop offset="1" stop-color="#071a33"/></linearGradient><radialGradient id="glow"><stop stop-color="#d4af37" stop-opacity=".5"/><stop offset="1" stop-color="#d4af37" stop-opacity="0"/></radialGradient><pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse"><path d="M70 0H0V70" fill="none" stroke="#fff" stroke-opacity=".05"/></pattern></defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"/><circle cx="275" cy="470" r="430" fill="url(#glow)"/><path d="M0 730 430 300l330 330 330-390 510 490v170H0Z" fill="#000" opacity=".35"/>
  <text x="88" y="105" fill="#d4af37" font-family="Arial,sans-serif" font-size="30" font-weight="700" letter-spacing="9">JNN FINAL · WEEK 2</text><text x="88" y="205" fill="#fff" font-family="Arial Black,Arial,sans-serif" font-size="76">FIRST WIN.</text>
  <g transform="translate(90 278)"><rect width="660" height="285" rx="10" fill="#050505" stroke="#d4af37" stroke-width="4"/><text x="42" y="72" fill="#a5acaf" font-family="Arial,sans-serif" font-size="28" font-weight="700" letter-spacing="5">UNIVERSIDAD MÉXICO</text><text x="40" y="235" fill="#fff" font-family="Arial Black,Arial,sans-serif" font-size="176">10</text></g>
  <g transform="translate(850 278)"><rect width="660" height="285" rx="10" fill="#fff" opacity=".96"/><text x="42" y="72" fill="#003087" font-family="Arial,sans-serif" font-size="28" font-weight="700" letter-spacing="8">DUKE</text><text x="40" y="235" fill="#003087" font-family="Arial Black,Arial,sans-serif" font-size="176">7</text></g>
  <text x="800" y="470" text-anchor="middle" fill="#e31837" font-family="Arial Black,Arial,sans-serif" font-size="52">FINAL</text><text x="90" y="665" fill="#fff" font-family="Arial Black,Arial,sans-serif" font-size="48">PANTERAS HOLD DUKE TO 114 YARDS</text><text x="90" y="730" fill="#a5acaf" font-family="Arial,sans-serif" font-size="30">BHAGHANI 40-YARD WINNER · KNIGHT 93 RUSH YDS · IAMALEAVA 164 PASS YDS</text>
  <g transform="translate(90 790)"><rect width="290" height="58" fill="#d4af37"/><text x="145" y="40" text-anchor="middle" fill="#050505" font-family="Arial Black,Arial,sans-serif" font-size="25">HISTORY: 1–1</text></g><text x="1508" y="840" text-anchor="end" fill="#fff" font-family="Arial Black,Arial,sans-serif" font-size="40">JNN</text>
</svg>
