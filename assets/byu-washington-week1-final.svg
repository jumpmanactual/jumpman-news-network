<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">BYU defeats Washington 57 to 21</title><desc id="desc">Original JNN final score graphic for the Week 1 father-son coaching matchup.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06182f"/><stop offset=".55" stop-color="#0b376c"/><stop offset="1" stop-color="#2d174e"/></linearGradient><pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse"><path d="M64 0H0V64" fill="none" stroke="#fff" stroke-opacity=".045"/></pattern><filter id="shadow"><feDropShadow dx="0" dy="15" stdDeviation="16" flood-opacity=".48"/></filter></defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"/><path d="M0 900V610L640 0h270L260 900z" fill="#fff" opacity=".035"/><path d="M1050 0h550v900H780z" fill="#4b2e83" opacity=".32"/>
  <text x="90" y="90" fill="#ff3655" font-family="Arial,Helvetica,sans-serif" font-size="25" font-weight="900" letter-spacing="6">WEEK 1 • FINAL</text><text x="1510" y="90" text-anchor="end" fill="#fff" font-family="Arial Black,Arial,sans-serif" font-size="48">JNN</text>
  <g transform="translate(90 165)"><text y="95" fill="#fff" font-family="Arial Black,Arial,sans-serif" font-size="122" font-weight="900">SON RISES.</text><text y="205" fill="#fff" font-family="Arial Black,Arial,sans-serif" font-size="88" font-weight="900">COUGARS ROAR.</text><text y="270" fill="#b9c9da" font-family="Arial,Helvetica,sans-serif" font-size="29" font-weight="700" letter-spacing="3">CHRIS CATHCART WINS THE FIRST FAMILY SHOWDOWN</text></g>
  <g transform="translate(90 500)" filter="url(#shadow)"><rect width="1420" height="220" rx="6" fill="#f7f9fc"/><rect width="710" height="220" fill="#002e5d"/><text x="55" y="68" fill="#b9c9da" font-family="Arial,Helvetica,sans-serif" font-size="23" font-weight="800" letter-spacing="4">NO. 12 BYU</text><text x="55" y="174" fill="#fff" font-family="Arial Black,Arial,sans-serif" font-size="122">57</text><text x="765" y="68" fill="#5b6780" font-family="Arial,Helvetica,sans-serif" font-size="23" font-weight="800" letter-spacing="4">NO. 23 WASHINGTON</text><text x="765" y="174" fill="#4b2e83" font-family="Arial Black,Arial,sans-serif" font-size="122">21</text></g>
  <g transform="translate(90 785)"><text fill="#fff" font-family="Arial,Helvetica,sans-serif" font-size="27" font-weight="800">39 UNANSWERED AFTER HALFTIME</text><text x="550" fill="#b9c9da" font-family="Arial,Helvetica,sans-serif" font-size="27" font-weight="700">BACHMEIER: 292 YDS • 5 TD</text><text x="1110" fill="#b9c9da" font-family="Arial,Helvetica,sans-serif" font-size="27" font-weight="700">BYU: 0 TURNOVERS</text></g><rect x="90" y="840" width="1420" height="3" fill="#e31837"/>
