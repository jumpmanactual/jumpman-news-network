    <text x="30" y="115" fill="#fff" font-family="Arial Black, Arial, sans-serif" font-size="40">UMX 10</text>
    <text x="30" y="170" fill="#fff" font-family="Arial Black, Arial, sans-serif" font-size="40">DUKE 7</text>
  </g>
  <g transform="translate(580 510)">
