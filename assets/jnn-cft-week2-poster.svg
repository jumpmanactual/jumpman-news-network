<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">JNN College Football Tonight Week 2</title>
  <desc id="desc">Original broadcast poster featuring the three Week 2 user-team finals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#06172d"/><stop offset=".52" stop-color="#0b2745"/><stop offset="1" stop-color="#330d18"/></linearGradient>
    <linearGradient id="red" x1="0" x2="1"><stop stop-color="#ef1738"/><stop offset="1" stop-color="#9d0a27"/></linearGradient>
    <pattern id="lines" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M0 80L80 0" stroke="#fff" stroke-opacity=".025" stroke-width="2"/></pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#lines)"/>
  <path d="M0 0H640L350 900H0Z" fill="#ef1738" opacity=".09"/><path d="M1600 0H1120L1390 900H1600Z" fill="#fff" opacity=".035"/>
