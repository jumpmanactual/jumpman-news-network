  <text x="135" y="385" fill="#fff" font-family="Arial Black, Arial, sans-serif" font-size="82" font-weight="900">TONIGHT · WEEK 2</text>
  <text x="1100" y="375" fill="#fff" opacity=".13" font-family="Arial Black, Arial, sans-serif" font-size="270">02</text>
